<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Rounded background matching macOS squircle shape -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="#000000"/>

  <!-- White "O" ring -->
  <circle cx="512" cy="512" r="320" fill="white"/>
  <circle cx="512" cy="512" r="210" fill="black"/>

  <!-- Terminal prompt >_ inside the O -->
  <!-- ">" chevron -->
  <polyline points="430,440 500,510 430,580" fill="none" stroke="white" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- "_" underscore -->
  <line x1="520" y1="580" x2="600" y2="580" stroke="white" stroke-width="48" stroke-linecap="round"/>
</svg>
